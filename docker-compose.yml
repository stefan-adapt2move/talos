version: "3.8"

services:
  atlas:
    build: .
    container_name: atlas
    restart: unless-stopped
    volumes:
      - ./volume:/home/atlas
      - ./logs:/atlas/logs
    environment:
      - TZ=Europe/Berlin
      # Uncomment for API key auth (alternative to OAuth):
      # - ANTHROPIC_API_KEY=sk-ant-...
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - atlas

  # Speech-to-Text sidecar (Parakeet TDT v3, Whisper-compatible API)
  # Uncomment to enable voice message transcription.
  # First start downloads the ONNX model (~670MB).
  # stt:
  #   image: ghcr.io/achetronic/parakeet:latest
  #   container_name: atlas-stt
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:5092:5092"
  #   networks:
  #     - atlas

networks:
  atlas:
    driver: bridge
