version: "3.8"

services:
  talos:
    build: .
    container_name: talos
    restart: unless-stopped
    volumes:
      - ./volume:/home/agent
      - ./logs:/atlas/logs
    environment:
      - TZ=Europe/Berlin
      - APP_NAME=Talos
      # --- Core (prefix follows APP_NAME: TALOS_*) ---
      # - TALOS_AGENT_NAME=Talos          # Display name (alias: AGENT_NAME)
      # - TALOS_AGENT_EMAIL=              # Agent email address
      # - ANTHROPIC_API_KEY=sk-ant-...    # API key auth (alternative to OAuth)
      # - TALOS_API_KEY=                  # Protect /api/v1/* endpoints with this key
      #
      # --- Models ---
      # - TALOS_MODEL_TRIGGER=opus        # Model for trigger/PM sessions
      # - TALOS_MODEL_CRON=sonnet         # Model for cron sessions
      # - TALOS_MODEL_SUBAGENT_REVIEW=sonnet
      # - TALOS_MODEL_HOOKS=haiku
      #
      # --- Integrations ---
      # - TALOS_SIGNAL_NUMBER=+491701234567
      # - TALOS_SIGNAL_WHITELIST=+49170...,+49171...
      # - TALOS_EMAIL_IMAP_HOST=imap.gmail.com
      # - TALOS_EMAIL_USERNAME=talos@example.com
      # - TALOS_STT_URL=http://stt:5092/v1/audio/transcriptions
      #
      # --- Secrets (bridged to $HOME/secrets/<name>) ---
      # - TALOS_SECRET_GITHUB_TOKEN=ghp_...
      # - TALOS_SECRET_EMAIL_PASSWORD=...
      #
      # --- Workspace ---
      # - TALOS_PROJECTS_DIR=/shared/projects  # Custom projects mount point
      #
      # --- Usage Reporting ---
      # - TALOS_USAGE_ENABLED=true
      # - TALOS_USAGE_WEBHOOK_URL=https://app.example.org/api/usage
      # - TALOS_USAGE_WEBHOOK_SECRET=secret
      #
      # --- Outlook / Microsoft Graph ---
      # - OUTLOOK_TENANT_ID=
      # - OUTLOOK_CLIENT_ID=
      # - OUTLOOK_CLIENT_SECRET=
      # - OUTLOOK_MAILBOX=travel-assistant@adapt2move.de
      # - OUTLOOK_ALLOWED_SENDERS=
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - talos

  # Optional: Speech-to-Text sidecar (Parakeet TDT v3, Whisper-compatible API).
  # Remove if using an external/shared STT service. First start downloads ONNX model (~670MB).
  stt:
    image: ghcr.io/achetronic/parakeet:latest
    container_name: talos-stt
    restart: unless-stopped
    networks:
      - talos

networks:
  talos:
    driver: bridge
