version: "3.8"

services:
  talos:
    build: .
    container_name: talos
    restart: unless-stopped
    volumes:
      - ./volume:/home/agent
      - ./logs:/atlas/logs
    environment:
      - TZ=Europe/Berlin
      - APP_NAME=Talos
      # --- Core (prefix follows APP_NAME: TALOS_*) ---
      # - TALOS_AGENT_NAME=Talos
      # - ANTHROPIC_API_KEY=sk-ant-...
      #
      # --- Models ---
      # - TALOS_MODEL_TRIGGER=opus
      # - TALOS_MODEL_CRON=sonnet
      #
      # --- Integrations ---
      # - TALOS_STT_URL=http://stt:5092/v1/audio/transcriptions
      #
      # --- Secrets (bridged to $HOME/secrets/<name>) ---
      # - TALOS_SECRET_GITHUB_TOKEN=ghp_...
      #
      # --- Outlook / Microsoft Graph ---
      # - OUTLOOK_TENANT_ID=
      # - OUTLOOK_CLIENT_ID=
      # - OUTLOOK_CLIENT_SECRET=
      # - OUTLOOK_MAILBOX=travel-assistant@adapt2move.de
      # - OUTLOOK_ALLOWED_SENDERS=
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - talos

  stt:
    image: ghcr.io/achetronic/parakeet:latest
    container_name: talos-stt
    restart: unless-stopped
    networks:
      - talos

networks:
  talos:
    driver: bridge
